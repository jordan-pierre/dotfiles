# -----------------------------------------------------------------------------
# Snazzy skin with transparent background — theme-adaptive
# -----------------------------------------------------------------------------
#
# Adapted from: https://github.com/derailed/k9s/blob/master/skins/snazzy.yaml
# Targets k9s v0.51.x skin schema.
#
# Main text/backgrounds use `default` so they inherit the terminal's own fg/bg
# and stay readable in either a light or dark terminal. Accents use ANSI
# palette names, which also track the terminal theme.
#
# CAVEAT: with a transparent background k9s cannot paint the selected-row
# background, so the selection is shown via a bold, standout text color rather
# than a filled bar. If you want a filled green selection bar, use the sibling
# `snazzy-dark` (or `snazzy-light`) skin, which uses a solid background.

# Skin...
k9s:
  body:
    fgColor: default
    bgColor: default
    logoColor: green
  prompt:
    fgColor: default
    bgColor: default
    suggestColor: green
  info:
    fgColor: default
    sectionColor: green
  dialog:
    fgColor: default
    bgColor: default
    buttonFgColor: default
    buttonBgColor: default
    buttonFocusFgColor: black
    buttonFocusBgColor: green
    labelFgColor: default
    fieldFgColor: green
  frame:
    border:
      fgColor: green
      focusColor: green
    menu:
      fgColor: default
      keyColor: cyan
      numKeyColor: magenta
    crumbs:
      fgColor: black
      bgColor: green
      activeColor: "#d75f00"
    status:
      newColor: default
      modifyColor: green
      addColor: cyan
      errorColor: red
      highlightColor: "#d75f00"
      killColor: magenta
      completedColor: gray
    title:
      fgColor: green
      bgColor: default
      highlightColor: "#d75f00"
      counterColor: cyan
      filterColor: cyan
  views:
    charts:
      bgColor: default
      defaultDialColors:
        - cyan
        - red
      defaultChartColors:
        - cyan
        - red
    table:
      fgColor: default
      bgColor: default
      # Transparent bg can't render a filled bar; make the selected row stand
      # out with a bold, high-visibility text color instead.
      cursorFgColor: "#d75f00"
      cursorBgColor: default
      markColor: "#d75f00"
      header:
        fgColor: cyan
        bgColor: default
        sorterColor: "#d75f00"
        selectedSortColumnColor: cyan
    xray:
      fgColor: default
      bgColor: default
      cursorColor: green
      graphicColor: "#d75f00"
      showIcons: false
    yaml:
      keyColor: red
      colonColor: cyan
      valueColor: default
    logs:
      fgColor: default
      bgColor: default
      indicator:
        fgColor: default
        bgColor: default
        toggleOnColor: red
        toggleOffColor: default
